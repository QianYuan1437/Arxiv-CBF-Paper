name: Update CBF Papers

on:
  schedule:
    - cron: '0 23 * * *'   # 北京时间 07:00
    - cron: '0 4 * * *'    # 北京时间 12:00
    - cron: '0 9 * * *'    # 北京时间 17:00
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    # 跳过 bot 自身触发的 push，只响应真实用户提交
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python fetch_papers.py

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update CBF papers $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
